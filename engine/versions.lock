# Konclave — engine/versions.lock
#
# Deterministic pin of the official Zcash Foundation tools (Layer 1 — Engine).
# Policy: build from source at a fixed git rev; never follow `main`. Bumps are deliberate.
#
# Verified and pinned in Phase 1A (2026-06-30): all three tools live in ONE repo
# (frost-tools), so a single rev guarantees crypto-version coherence across them.
# Built in WSL2/Ubuntu with rustc 1.96.1.

format = 2
network_target = "NU6.2"                                          # hard-fork 2026-06-03, Orchard re-enabled
reference_tutorial = "https://frost.zfnd.org/zcash/ywallet-demo.html"
ciphersuite = "redpallas"                                         # pass `-C redpallas` -> Rerandomized FROST

[source.frost-tools]
repo = "https://github.com/ZcashFoundation/frost-tools"
rev  = "3d2985cfbc5df9314f3882a6d693bbe0d711051f"                 # "frostd: don't force localhost ... (#587)"
# Transitive deps are locked by the repo's committed Cargo.lock at this rev.

# Binaries produced from the source above (sha256 of THIS build — see NOTE):
[[binary]]
name    = "frostd"
version = "0.1.0"
sha256  = "efd1647783d13599072841cad92b0d01ea42ecfd871d50846e26a57929ff1a0c"
role    = "Coordination server (blind). Local dev: run with --no-tls-very-insecure. Default port 2744."

[[binary]]
name    = "frost-client"
version = "0.1.0"
sha256  = "4e0c0185850ac1cc9b2860b1fa249826b9b9f7656c7cc3963cde13e33340fd1a"
role    = "init / dkg / trusted-dealer / coordinator / participant; contacts; sessions; --cli for JSON"

[[binary]]
name    = "zcash-sign"
version = "0.1.0"
sha256  = "df64816ecb3d923d82d303df9fab241d18d2e0039277014f6f508b2f0cce5238"
role    = "generate --ak -> Orchard addr + UFVK; sign tx-plan(Ywallet)/PCZT with external FROST signature"

# Key transitive crypto deps (recorded for audit; authoritative lock is Cargo.lock @ rev):
[crypto_deps]
frost_core           = "2.2.0"
frost_rerandomized   = "2.1.0"
reddsa               = "0.5.1 (+git rev ed49e9ca0699a6450f6d4a9fe62ff168f5ea1ead)"
orchard              = "0.11.0 (fork github.com/conradoplg/orchard rev 4d001c5b6ad15373e68a5923d5868fbe42daba96)"
pczt                 = "0.5.0"
zcash_client_backend = "0.21.0"

# NOTE: sha256 values are for binaries built on THIS machine; the build is not bit-reproducible,
# so the authoritative reproducibility anchor is (repo rev + the repo's committed Cargo.lock).
# zcash_client_backend is also LINKED into the Orchestrator (src-tauri/), pinned there via its own
# Cargo.lock — not invoked as a binary.
