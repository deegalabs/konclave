name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (orchestrator · konclave-signer · konclave-wasm · relay-server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            orchestrator
            konclave-signer
            konclave-wasm
            relay-server
      - name: Install build deps (protoc)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Format check
        run: |
          cargo fmt --manifest-path orchestrator/Cargo.toml -- --check
          cargo fmt --manifest-path konclave-signer/Cargo.toml -- --check
          cargo fmt --manifest-path konclave-wasm/Cargo.toml -- --check
          cargo fmt --manifest-path relay-server/Cargo.toml -- --check
      - name: Clippy
        run: |
          cargo clippy --manifest-path orchestrator/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path konclave-signer/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path konclave-wasm/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path relay-server/Cargo.toml --all-targets -- -D warnings
      - name: Test
        run: |
          cargo test --manifest-path orchestrator/Cargo.toml
          cargo test --manifest-path konclave-signer/Cargo.toml
          cargo test --manifest-path konclave-wasm/Cargo.toml
          cargo test --manifest-path relay-server/Cargo.toml

  wasm:
    name: WASM (konclave-wasm → browser build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: konclave-wasm
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build for the browser (wasm32 + wasm-bindgen)
        working-directory: konclave-wasm
        run: wasm-pack build --target web --out-dir /tmp/pkg

  ui:
    name: UI (Vite/React frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm run test
      - name: Type-check + build (tsc -b && vite build)
        run: npm run build

  node-packages:
    name: Node packages (mcp-server · sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: mcp-server (install + type-check)
        working-directory: mcp-server
        run: npm ci && npx tsc --noEmit
      - name: sdk (install + type-check)
        working-directory: sdk
        run: npm ci && npx tsc --noEmit
