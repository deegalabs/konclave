<!doctype html><meta charset="utf8"><body>
<!-- Drives the full 2-of-3 ceremony from JS via the wasm-bindgen API. Serve this dir over
     http (wasm fetch is blocked over file://) and open; the <title> reports the result. -->
<script type="module">
import init, { TestVault, participantRound1, participantRound2, Coordinator } from '../pkg/konclave_wasm.js';
try {
  await init();
  const message = new TextEncoder().encode("konclave: a real Orchard sighash goes here");
  const v = new TestVault();
  const a = participantRound1(v.key_package(0));
  const b = participantRound1(v.key_package(1));
  const coord = new Coordinator(v.groupVk(), v.pubkeys(), message);
  coord.addCommitment(v.id(0), a.commitment());
  coord.addCommitment(v.id(1), b.commitment());
  coord.prepare();
  const sp = coord.signingPackage(), seed = coord.seed();
  coord.addShare(v.id(0), participantRound2(sp, a.nonces(), v.key_package(0), seed));
  coord.addShare(v.id(1), participantRound2(sp, b.nonces(), v.key_package(1), seed));
  const sig = coord.aggregate();
  document.title = coord.verify(sig) ? ("JS-CEREMONY-OK sig=" + sig.length + "B") : "VERIFY-FAILED";
} catch (e) { document.title = "ERR: " + e; }
</script>
